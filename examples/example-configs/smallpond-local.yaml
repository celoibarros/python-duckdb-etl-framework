duckdb:
  path: ":memory:"
  lazy_load: true

input:
  tables: []

transform:
  steps:
    - type: smallpond_sql
      input_path: "examples/smallpond/input/*.parquet"
      output_path: "examples/smallpond/output/"
      sql: "SELECT customer_id, SUM(amount) AS total_amount FROM {0} GROUP BY customer_id"
      repartition: 4
      hash_by: customer_id

output: []
