repos:
  # General file and git checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer  # Adds newline at EOF
      - id: trailing-whitespace  # Removes extra spaces
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending  # Normalizes line endings
      - id: check-added-large-files  # Prevents committing large files
      - id: detect-private-key  # Prevents committing secrets

  # Black for code formatting (Auto-fixes)
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        name: black
        entry: black
        types: [python]
        additional_dependencies: ['click==8.1.3']

  # isort for sorting imports (Auto-fixes)
  - repo: https://github.com/pre-commit/mirrors-isort
    rev: v5.10.1
    hooks:
      - id: isort
        types: [python]

  # autoflake to remove unused imports and variables (Auto-fixes)
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        name: autoflake
        entry: autoflake
        args: [--in-place, --expand-star-imports, --remove-duplicate-keys, --remove-unused-variables, --ignore-init-module-imports]
        types: [python]

  # pylint for linting (Auto-fixes with --fix flag)
  - repo: https://github.com/PyCQA/pylint
    rev: v3.3.5
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        types: [python]
        args: ["--fix"]

  # pydocstyle for docstrings (Auto-fixes with --match flag)
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: ["--match", ".*\\.py"]

  # Bandit for security checks (Auto-fixes if possible)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-r", "."]
